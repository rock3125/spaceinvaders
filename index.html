<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Space Invaders</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
  <script src="sketch.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #222;
      overflow: hidden;
      touch-action: none; /* Prevent default touch actions like scrolling */
    }
    canvas {
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
      width: 100% !important;
      height: 100% !important;
      max-width: calc(100vh * 4 / 3) !important;
      max-height: calc(100vw * 3 / 4) !important;
    }
    #controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      height: 120px;
      display: flex;
      justify-content: space-between;
      pointer-events: none; /* Let canvas receive clicks if not on buttons */
      z-index: 10;
    }
    #joystick-zone {
      position: relative;
      width: 150px;
      height: 120px;
      pointer-events: auto;
    }
    #fire-button {
      position: relative;
      width: 80px;
      height: 80px;
      margin-right: 30px;
      margin-top: 20px;
      background-color: rgba(255, 0, 0, 0.5);
      border: 2px solid red;
      border-radius: 50%;
      pointer-events: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: sans-serif;
      font-weight: bold;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }
    #fire-button:active {
      background-color: rgba(255, 0, 0, 0.8);
    }
    
    @media (hover: hover) and (pointer: fine) {
        /* Optionally hide controls on devices with a mouse, but keep them for testing if needed. 
           We'll keep them visible on small screens or we can just show them everywhere so they are easy to use.
           Let's show them on screens < 800px or when it's a touch device. */
        #controls {
            display: none;
        }
    }
    /* If screen is small, always show controls */
    @media (max-width: 800px) {
        #controls {
            display: flex !important;
        }
    }
  </style>
</head>
<body>
  <div id="controls">
    <div id="joystick-zone"></div>
    <div id="fire-button">FIRE</div>
  </div>
</body>
</html>
