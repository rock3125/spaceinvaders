<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Retro Space Invaders (SVG)</title>
  <!-- Google Font for classic arcade typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #080808;
      color: #ffffff;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: 100%;
      max-width: 560px; /* 224 scaled up by 2.5 */
      aspect-ratio: 224 / 256;
      border: 4px solid #333;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
    }

    svg {
      width: 100%;
      height: 100%;
      background-color: #000000;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Simple retro CRT scanline effect overlay */
    #crt-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        rgba(18, 16, 16, 0) 50%, 
        rgba(0, 0, 0, 0.25) 50%
      ), linear-gradient(
        90deg,
        rgba(255, 0, 0, 0.06),
        rgba(0, 255, 0, 0.02),
        rgba(0, 0, 255, 0.06)
      );
      background-size: 100% 3px, 3px 100%;
      pointer-events: none;
      z-index: 10;
    }

    #instructions {
      margin-top: 15px;
      font-size: 10px;
      color: #888;
      text-align: center;
      line-height: 1.6;
    }

    .key {
      background: #222;
      border: 1px solid #555;
      padding: 2px 6px;
      border-radius: 3px;
      color: #eee;
    }

    .flash {
      animation: pulse 1s infinite steps(2, start);
    }

    @keyframes pulse {
      0%, 49% { opacity: 0; }
      50%, 100% { opacity: 1; }
    }

    #mobile-controls {
      display: none;
      position: absolute;
      bottom: -60px;
      left: 0;
      width: 100%;
      justify-content: space-between;
      padding: 10px;
      box-sizing: border-box;
    }

    #mobile-controls button, #joystick {
      background: #333;
      color: #eee;
      border: 1px solid #555;
      padding: 15px 25px;
      font-size: 16px;
      border-radius: 5px;
      touch-action: none;
      user-select: none;
    }

    #joystick {
      flex-grow: 1;
      margin-right: 10px;
      text-align: center;
      line-height: 1;
    }

    @media (pointer: coarse) {
      #mobile-controls {
        display: flex;
      }
    }
  </style>
</head>
<body>

  <div id="game-container">
    <div id="crt-overlay"></div>
    <svg id="game-viewport" viewBox="0 0 224 256">
      <!-- SVG Defs for reuse if needed -->
      <defs>
        <!-- Horizontal red/green overlay like the original arcade cabin -->
        <linearGradient id="cabin-gradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff1a1a" />
          <stop offset="70%" stop-color="#ffffff" />
          <stop offset="85%" stop-color="#00ff00" />
          <stop offset="100%" stop-color="#00ff00" />
        </linearGradient>
      </defs>

      <!-- Main groups for layering -->
      <g id="ui-layer"></g>
      <g id="bunker-layer"></g>
      <g id="entity-layer"></g>
      <g id="overlay-layer"></g>
    </svg>
    <div id="mobile-controls">
      <div id="joystick">◀ &nbsp;&nbsp;&nbsp; ▶</div>
      <button id="btn-fire">FIRE</button>
    </div>
  </div>

  <div id="instructions">
    [A] / [D] or [◀] / [▶] to Move &nbsp;&nbsp;&nbsp; [SPACE] to Fire<br>
    [P] to Pause &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; [ENTER] to Start
  </div>

  <script src="game.js"></script>
</body>
</html>
